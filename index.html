<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sơ Sơ Cá Nhân</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="avatar-container">
                <img id="avatar-img" class="avatar" alt="Avatar">
                <label for="avatar-upload" class="avatar-upload-label">📷</label>
                <input type="file" id="avatar-upload" class="avatar-upload-input" accept="image/*">
            </div>
            <h1></h1>
            <p></p>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Thông tin cơ bản -->
            <div class="section">
                <h2 class="section-title">📋 Thông Tin Cơ Bản</h2>
                <div class="info-grid"></div>
            </div>

            <!-- Giới thiệu -->
            <div class="section">
                <h2 class="section-title">✍️ Giới Thiệu</h2>
                <div class="introduction"></div>
            </div>

            <!-- Kỹ năng -->
            <div class="section">
                <h2 class="section-title">🛠️ Kỹ Năng</h2>
                <div class="skills-container"></div>
            </div>

            <!-- Liên kết xã hội -->
            <div class="section">
                <h2 class="section-title">🌐 Liên Kết Xã Hội</h2>
                <div class="social-links"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
